name: Publish Python distribution to PyPI

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Required vars
# - PACKAGE_NAME: openwebui-mcp-server
# - PROD_ENVIRONMENT_NAME: pypi
# - TEST_ENVIRONMENT_NAME: test.pypi

env:
  ARTEFACT_NAME: python-package-distributions

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build distribution
    runs-on: ${{ fromJSON(vars.RUNS_ON) }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: "false"
          github-server-url: "https://github.com"
      - uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0

      - name: Install build dependencies
        run: uv pip install build
      - name: Build wheel and sdist
        run: mise run build
      - name: Upload distributions (to act local mock artefactory)
        if: ${{ env.ACT == true }}
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2 (for local act)
        with:
          name: ${{ env.ARTEFACT_NAME }}
          path: dist/
          retention-days: 1
      - name: Upload distributions
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0 (for remote gh)
        with:
          name: ${{ env.ARTEFACT_NAME }}
          path: dist/
          retention-days: 5
    concurrency:
      group: ${{ github.sha }}
      cancel-in-progress: true
    timeout-minutes: 10
    continue-on-error: false

  publish-dev:
    name: "Publish dev release to Test PyPI"
    if: true # Always build a dev version for every push/run
    needs:
      - "build"
    env:
      REPOSITORY_URL: https://${{ vars.TEST_ENVIRONMENT_NAME }}.org/p/${{ vars.PACKAGE_NAME }}/
      REPOSITORY_UPLOAD_URL: https://${{ vars.TEST_ENVIRONMENT_NAME }}.org/legacy/
    environment:
      name: ${{ vars.TEST_ENVIRONMENT_NAME }}
      url: ${{ env.REPOSITORY_URL }}
    runs-on: ${{ fromJSON(vars.RUNS_ON) }}
    permissions:
      contents: read
      packages: write
      id-token: write # OIDC for Test PyPI
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: "false"
          github-server-url: "https://github.com"
      - uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0
      - name: "Download distributions from build job"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.ARTEFACT_NAME }}
          path: dist/
      - name: "Set dev version"
        run: mise run set:dev-version
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
      - name: "Install build dependencies"
        run: uv pip install build
      - name: "Rebuild with dev version"
        run: mise run build
      - uses: qoomon/actions--context@e12e182be797e3476990faf801dd1b87f107f91c # v5.0.1
      - name: "Publish to Test PyPI (OIDC)"
        if: ${{ !env.ACT }}
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          # Uses OpenID Connect (OIDC) trust relationship
          # No username/password needed - PyPI validates the OIDC token
          attestations: 'true'
          repository-url: ${{ env.REPOSITORY_UPLOAD_URL }}
          print-hash: 'true'
          skip-existing: 'true'
          verbose: 'true'
      - name: "Publish to local Mock Artifactory"
        if: ${{ env.ACT == true }}
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          user: '__token__'
          password: ${{ secrets.PYPI_API_TOKEN }}
          attestations: 'false'
          repository-url: ${{ env.REPOSITORY_UPLOAD_URL }}
          print-hash: 'true'
          skip-existing: 'true'
          verbose: 'true'
    concurrency:
      group: ${{ github.sha }}
      cancel-in-progress: true
    timeout-minutes: 10
    continue-on-error: false

  publish-release:
    name: "Publish release to PyPI"
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ${{ fromJSON(vars.RUNS_ON) }}
    environment:
      name: ${{ vars.PROD_ENVIRONMENT_NAME }}
      url: https://pypi.org/p/${{ vars.PACKAGE_NAME }}/
    permissions:
      contents: read
      packages: write
      id-token: write # OIDC for production PyPI
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: "false"
          github-server-url: "https://github.com"
      - uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0
      - name: "Extract version from tag"
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "tag_version=$TAG_VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $TAG_VERSION"
          # Validate version format (semver)
          if ! echo "$TAG_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "ERROR: Version must follow semantic versioning (MAJOR.MINOR.PATCH)"
            exit 1
          fi
      - name: "Set release version from tag"
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.tag_version }}\"/" pyproject.toml
          echo "Set version to: ${{ steps.version.outputs.tag_version }}"
      - name: "Install build dependencies"
        run: uv pip install build
      - name: "Build with release version"
        run: mise run build
      - uses: qoomon/actions--context@e12e182be797e3476990faf801dd1b87f107f91c # v5.0.1
      - name: "Publish to PyPI (OIDC)"
        if: ${{ !env.ACT }}
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          # Uses OpenID Connect (OIDC) trust relationship
          # No username/password needed - PyPI validates the OIDC token
          attestations: 'true'
          print-hash: 'true'
          verbose: 'true'
      - name: "Publish to local Mock Artifactory"
        if: ${{ env.ACT == true }}
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          user: '__token__'
          password: ${{ secrets.PYPI_API_TOKEN }}
          attestations: 'false'
          print-hash: 'true'
          verbose: 'true'
    concurrency:
      group: release-${{ github.sha }}
      cancel-in-progress: false # Never cancel production releases
    timeout-minutes: 15
    continue-on-error: false

  create-release:
    name: "Create GitHub Release"
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: publish-release
    runs-on: ${{ fromJSON(vars.RUNS_ON) }}
    permissions:
      contents: write # Required to create releases
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: "false"
          fetch-depth: 0
      - name: "Extract version from tag"
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "tag_version=$TAG_VERSION" >> $GITHUB_OUTPUT
      - name: "Generate changelog"
        id: changelog
        run: |
          # Generate changelog from commits since last tag
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            echo "No previous tag found, using full history"
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" ${PREVIOUS_TAG}..HEAD)
          fi
          # Escape newlines for GitHub Actions
          CHANGELOG="${CHANGELOG//'%'/'%25'}"
          CHANGELOG="${CHANGELOG//$'\n'/'%0A'}"
          CHANGELOG="${CHANGELOG//$'\r'/'%0D'}"
          echo "changelog=$CHANGELOG" >> $GITHUB_OUTPUT
      - name: "Create GitHub Release"
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          name: "Release v${{ steps.version.outputs.tag_version }}"
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.changelog }}

            ## Installation

            ```bash
            pip install openwebui-mcp-server==${{ steps.version.outputs.tag_version }}
            ```

            Or with uv:
            ```bash
            uv pip install openwebui-mcp-server==${{ steps.version.outputs.tag_version }}
            ```
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag_version, '-') }}
          generate_release_notes: true
    timeout-minutes: 5
