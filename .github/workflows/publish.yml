name: Publish Python distribution to PyPI

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Required vars
# - PACKAGE_NAME: openwebui-mcp-server
# - PROD_ENVIRONMENT_NAME: pypi
# - TEST_ENVIRONMENT_NAME: test.pypi

env:
  ARTEFACT_NAME: python-package-distributions

defaults:
  run:
    shell: bash

jobs:
  build:
    name: Build distribution
    runs-on: ${{ fromJSON(vars.RUNS_ON) }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: "false"
          github-server-url: "https://github.com"
      - uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0
      - name: Install build dependencies
        run: uv pip install build
      - name: Build wheel and sdist
        run: mise run build
      - name: Upload distributions (to act local mock artefactory)
        if: ${{ env.ACT == true }}
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2 (for local act)
        with:
          name: ${{ env.ARTEFACT_NAME }}
          path: dist/
          retention-days: 1
      - name: Upload distributions
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0 (for remote gh)
        with:
          name: ${{ env.ARTEFACT_NAME }}
          path: dist/
          retention-days: 5
    concurrency:
      group: ${{ github.sha }}
      cancel-in-progress: true
    timeout-minutes: 10
    continue-on-error: false

  publish-dev:
    name: "Publish dev release to Test PyPI"
    if: true # Alway build a dev version for every push/run
    needs:
      - "build"
    env:
      REPOSITORY_URL: https://${{ vars.TEST_ENVIRONMENT_NAME }}.org/p/${{ vars.PACKAGE_NAME }}/
      REPOSITORY_UPLOAD_URL: https://${{ vars.TEST_ENVIRONMENT_NAME }}.org/legacy/
    environment:
      name: ${{ vars.TEST_ENVIRONMENT_NAME }}
      url: ${{ env.REPOSITORY_URL }}
    runs-on: ${{ fromJSON(vars.RUNS_ON) }}
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: "false"
          github-server-url: "https://github.com"
      - uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4.0.0
      - name: "Set dev version"
        run: mise run set:dev-version
        env:
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
      - name: "Install build dependencies"
        run: uv pip install build
      - name: "Build with dev version"
        run: mise run build
      - uses: qoomon/actions--context@e12e182be797e3476990faf801dd1b87f107f91c # v5.0.1
      - name: "Publish to Test PyPI"
        if: ${{ !env.ACT }}
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          # Uses OpenID Connect (OIDC) trust relationship
          # user: null
          # password: null
          attestations: 'true'
          repository-url: ${{ env.REPOSITORY_UPLOAD_URL }}
          print-hash: 'true'
          skip-existing: 'true'
          verbose: 'true'
      - name: "Publish to local Mock Artifactory"
        if: ${{ env.ACT == true }}
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          user: '__token__'
          password: ${{ secrets.PYPI_API_TOKEN }}
          attestations: 'false'
          repository-url: ${{ env.REPOSITORY_UPLOAD_URL }}
          print-hash: 'true'
          skip-existing: 'true'
          verbose: 'true'
    concurrency:
      group: ${{ github.sha }}
      cancel-in-progress: true
    timeout-minutes: 10
    continue-on-error: false


