[settings]
experimental = true
unix_default_inline_shell_args = "zsh -c"
env_shell_expand = true

[tools]
uv = "latest"
ruff = "latest"
hadolint = "latest"
jq = "latest"
shfmt = "latest"
ghalint = "latest"
github-cli = "latest"
act = "latest"

[settings.python]
uv_venv_auto = "create|source"
uv_venv_create_args = ["--quiet", "--seed", "--allow-existing"]

[env]
# MISE_VERBOSE = true
# UV_MANAGED_PYTHON = true
PYTHONPATH = "{{config_root}}"

MISE_ENV = "fork" # TODO remove or rename to `local` once CI/CD and ownership is handed over
GITHUB_REPOSITORY_REMOTE = { value = "origin" } # NOTE: Overwritten in mise.fork.toml
GITHUB_REPOSITORY_OWNER = { value = "troylar" } # NOTE: Overwritten in mise.fork.toml
GITHUB_REPOSITORY_NAME = "open-webui-mcp-server"
GITHUB_REPOSITORY_SLUG = "{{env.GITHUB_REPOSITORY_OWNER}}/{{env.GITHUB_REPOSITORY_NAME}}"
PYPI_PACKAGE_NAME = "openwebui-mcp-server"
GITHUB_ACTION_PROD_ENVIRONMENT = "pypi"
GITHUB_ACTION_TEST_ENVIRONMENT = "test.pypi"

# Docker Compose Container Settings
MCP_TRANSPORT = "http"
MCP_HTTP_PORT = "8000" # exposed to host
MCP_HTTP_HOST = "127.0.0.1" # host
MCP_HTTP_PATH = "/mcp"
WEBUI_PORT = "3000" # exposed to host
MCP_SERVER_URL = "http://{{env.MCP_HTTP_HOST}}:{{env.MCP_HTTP_PORT}}{{env.MCP_HTTP_PATH}}"

# Can't be configured beforehand. Helper script at scripts/init-api-key.sh
# WEBUI_API_KEY = "mise run owu:api:init-key"
# https://docs.openwebui.com/reference/env-configuration/#webui_url
WEBUI_URL = "http://127.0.0.1:{{env.WEBUI_PORT}}"
# https://docs.openwebui.com/reference/env-configuration/#webui_admin_email
WEBUI_ADMIN_EMAIL = "admin@open-webui.local"
# https://docs.openwebui.com/reference/env-configuration/#webui_admin_password
WEBUI_ADMIN_PASSWORD = "password"

[tasks.install-dev]
run = """
uv lock
uv sync --extra="dev"
uv pip install -e ".[dev]"
"""

[tasks]
"owu:compose:build" = "docker compose --file {{config_root}}/compose.yaml build"
"owu:compose:up" = "docker compose --file {{config_root}}/compose.yaml --project-name open-webui-mcp-server up --detach"

"owu:docker:build" = "docker build --tag open-webui-mcp-server ."
"owu:docker:run" = "docker run --detach open-webui-mcp-server"

"owu:tests:unit" = "uv run pytest tests/test_client_changes.py tests/test_mcp_wrapper_logic.py -v"
"owu:tests:integration" = "uv run pytest tests/test_integration.py -v -m integration"
"owu:tests:wrapper-logic" = "uv run pytest tests/test_mcp_wrapper_logic.py -v"
"owu:tests:all" = "uv run pytest tests/ -v"

"owu:linter:check" = "ruff --config {{config_root}}/pyproject.toml check {{config_root}}/src/ {{config_root}}/tests/"
"owu:linter:fix" = "ruff --config {{config_root}}/pyproject.toml check --fix {{config_root}}/src/ {{config_root}}/tests/"

"owu:api:dump-spec" = "curl -sS {{env.WEBUI_URL}}/openapi.json | jq --sort-keys > {{config_root}}/specs/open-webui.openapi.json"
"owu:api:init-key" = { run = "bash init-api-key.sh", dir = "{{config_root}}/scripts/" }

"owu:gha:lint" = "ghalint run .github/workflows/publish.yml"
"owu:gha:validate" = { run = "act --validate --verbose", dir = "{{config_root}}" }
"owu:gha:act" = { run = ["cat .actrc", "act"], dir = "{{config_root}}" }

# Package build & publish tasks
[tasks.build]
description = "Build wheel and sdist distributions"
shell = "bash -c"
run = """
rm -rf {{config_root}}/dist
uv pip install build twine --quiet
uv run python -m build {{config_root}}
"""

[tasks."bump:dev"]
description = "Set dev version (e.g., 0.2.0 -> 0.2.0.dev1)"
shell = "bash -c"
run = """
VERSION=$(grep '^version' {{config_root}}/pyproject.toml | head -1 | sed 's/.*"\\(.*\\)"/\\1/')
if [[ "$VERSION" == *.dev* ]]; then
    NEW_VERSION=$(echo "$VERSION" | awk -F. '{print $1"."$2"."$3".dev"$4+1}')
else
    NEW_VERSION="${VERSION}.dev1"
fi
sed -i "s/^version = \\".*\\"/version = \\"$NEW_VERSION\\"/" {{config_root}}/pyproject.toml
echo "Bumped version: $VERSION -> $NEW_VERSION"
"""

[tasks."bump:patch"]
description = "Bump patch version (e.g., 0.2.0 -> 0.2.1)"
shell = "bash -c"
run = """
VERSION=$(grep '^version' {{config_root}}/pyproject.toml | head -1 | sed 's/.*"\\(.*\\)"/\\1/' | sed 's/\\.dev.*//')
MAJOR=$(echo "$VERSION" | cut -d. -f1)
MINOR=$(echo "$VERSION" | cut -d. -f2)
PATCH=$(echo "$VERSION" | cut -d. -f3)
NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
sed -i "s/^version = \\".*\\"/version = \\"$NEW_VERSION\\"/" {{config_root}}/pyproject.toml
echo "Bumped version: $VERSION -> $NEW_VERSION"
"""

[tasks."bump:minor"]
description = "Bump minor version (e.g., 0.2.0 -> 0.3.0)"
shell = "bash -c"
run = """
VERSION=$(grep '^version' {{config_root}}/pyproject.toml | head -1 | sed 's/.*"\\(.*\\)"/\\1/' | sed 's/\\.dev.*//')
MAJOR=$(echo "$VERSION" | cut -d. -f1)
MINOR=$(echo "$VERSION" | cut -d. -f2)
NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
sed -i "s/^version = \\".*\\"/version = \\"$NEW_VERSION\\"/" {{config_root}}/pyproject.toml
echo "Bumped version: $VERSION -> $NEW_VERSION"
"""

[tasks."bump:major"]
description = "Bump major version (e.g., 0.2.0 -> 1.0.0)"
shell = "bash -c"
run = """
VERSION=$(grep '^version' {{config_root}}/pyproject.toml | head -1 | sed 's/.*"\\(.*\\)"/\\1/' | sed 's/\\.dev.*//')
MAJOR=$(echo "$VERSION" | cut -d. -f1)
NEW_VERSION="$((MAJOR + 1)).0.0"
sed -i "s/^version = \\".*\\"/version = \\"$NEW_VERSION\\"/" {{config_root}}/pyproject.toml
echo "Bumped version: $VERSION -> $NEW_VERSION"
"""

[tasks."set:dev-version"]
description = "Set version with dev suffix using GITHUB_RUN_NUMBER (CI only)"
shell = "bash -c"
run = """
if [ -z "$GITHUB_RUN_NUMBER" ]; then
    echo "Error: GITHUB_RUN_NUMBER not set (CI only task)"
    exit 1
fi
VERSION=$(grep '^version' {{config_root}}/pyproject.toml | head -1 | sed 's/.*"\\(.*\\)"/\\1/' | sed 's/\\.dev.*//')
NEW_VERSION="${VERSION}.dev${GITHUB_RUN_NUMBER}"
sed -i "s/^version = \\".*\\"/version = \\"$NEW_VERSION\\"/" {{config_root}}/pyproject.toml
echo "Set dev version: $NEW_VERSION"
"""

[tasks.publish]
description = "Publish distributions to PyPI using twine"
shell = "bash -c"
run = """
uv run python -m twine upload {{config_root}}/dist/*
"""

[tasks."release:check"]
description = "Run pre-release checks (tests, linter, build)"
run = [
  "echo 'Running pre-release checks...'",
  "mise run owu:linter:check",
  "mise run owu:tests:all",
  "mise run build",
  "echo 'All checks passed!'"
]

[tasks."release:tag"]
description = "Create and push a release tag"
usage = 'arg "<version>" help="Version to release (e.g., 0.2.0)"'
run = """
VERSION="${usage_version}"
TAG="v${VERSION}"

# Validate version format
if ! echo "$VERSION" | grep -qE '^[0-9]+\\.[0-9]+\\.[0-9]+$'; then
    echo "Error: Version must follow semantic versioning (MAJOR.MINOR.PATCH)"
    exit 1
fi

# Check for uncommitted changes
if ! git diff --quiet || ! git diff --cached --quiet; then
    echo "Error: Uncommitted changes detected. Please commit or stash them first."
    exit 1
fi

# Check if tag already exists
if git tag | grep -q "^${TAG}$"; then
    echo "Error: Tag ${TAG} already exists"
    exit 1
fi

# Set version in pyproject.toml
sed -i "s/^version = \\".*\\"/version = \\"${VERSION}\\"/" {{config_root}}/pyproject.toml
echo "Set version to: ${VERSION}"

# Create and push tag
git add {{config_root}}/pyproject.toml
git commit -m "chore: bump version to ${VERSION}"
git tag -a "${TAG}" -m "Release ${TAG}"
git push origin main "${TAG}"
echo "Created and pushed tag: ${TAG}"
"""

[tasks."release:prepare"]
description = "Prepare a release (run checks, bump version, create tag)"
usage = 'arg "<version>" help="Version to release (e.g., 0.2.0)"'
run = """
mise run release:check
mise run release:tag "${usage_version}"
echo "Release preparation complete!"
echo "Monitor the release at: https://github.com/stephanschielke/open-webui-mcp-server/actions"
"""

