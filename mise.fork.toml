[env]
MISE_ENV = "fork"
GITHUB_REPOSITORY_OWNER = "stephanschielke"
GITHUB_REPOSITORY_NAME = "open-webui-mcp-server"
GITHUB_REPOSITORY_REMOTE = "fork"
DOCKER_HOST = "unix:///home/$USER/.docker/desktop/docker.sock"

[tasks."owu:gha:act:set-docker-host"]
run = """MISE_TOML="mise.$MISE_ENV.toml"
if [[ -z "$DOCKER_HOST" ]]; then
  {% raw %}
  DOCKER_HOST=$(docker context inspect --format '{{ .Endpoints.docker.Host }}')
  {% endraw %}
  echo "Setting $DOCKER_HOST as DOCKER_HOST to the $MISE_TOML file"
else
  echo "DOCKER_HOST already set to $DOCKER_HOST"
fi
mise config set --file="$MISE_TOML" "env.DOCKER_HOST" "$DOCKER_HOST"
"""
